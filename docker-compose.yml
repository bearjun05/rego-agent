services:
  postgres:
    image: postgres:16-alpine
    container_name: rego-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rego
      POSTGRES_PASSWORD: rego_local_password
      POSTGRES_DB: rego_agent
    ports:
      - "5436:5432"
    volumes:
      - rego_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rego -d rego_agent"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  rego_postgres_data:
