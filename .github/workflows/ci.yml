name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Secret scan (gitleaks-lite)
        run: pnpm check:secrets -- --ci

      - name: CODEOWNERS guard
        env:
          BASE_REF: origin/main
          PR_AUTHOR_HANDLE: ${{ github.event.pull_request.user.login || github.event.pusher.name }}
        run: pnpm check:codeowners pr

      - name: Manifest sync check (auto-update if needed)
        run: pnpm manifest:sync

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
